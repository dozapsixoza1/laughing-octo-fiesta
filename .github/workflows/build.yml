name: Build DramChat APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔧 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🤖 Build APK
        run: eas build --platform android --profile preview --non-interactive --output ./DramChat.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📁 Zip APK
        run: zip DramChat-release.zip DramChat.apk

      - name: 📤 Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: DramChat-APK
          path: DramChat-release.zip
          retention-days: 14
