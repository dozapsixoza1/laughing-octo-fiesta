name: Build DramChat APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@v4

      - name: 📦 Unzip DramChat
        run: unzip DramChat.zip

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        working-directory: ./DramChat
        run: npm install

      - name: 🔧 Fix eas.json
        working-directory: ./DramChat
        run: |
          cat > eas.json << 'EOF'
          {
            "cli": {
              "version": ">= 10.0.0",
              "appVersionSource": "local"
            },
            "build": {
              "preview": {
                "android": { "buildType": "apk" }
              }
            }
          }
          EOF

      - name: 🔧 Fix app.json
        working-directory: ./DramChat
        run: |
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json'));
            app.expo.extra = { eas: { projectId: 'a479f9a8-7f34-4a86-b0b9-8679070a1b76' } };
            app.expo.owner = 'dozapsixoza1';
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
          "

      - name: 🔧 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🤖 Build APK (local)
        working-directory: ./DramChat
        run: eas build --platform android --profile preview --non-interactive --local --output ../DramChat.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📁 Zip APK
        run: zip DramChat-release.zip DramChat.apk

      - name: 📤 Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: DramChat-APK
          path: DramChat-release.zip
          retention-days: 14
